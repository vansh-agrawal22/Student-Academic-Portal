<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Student Dashboard</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .card {
            background: white;
            border-radius: 12px;
            padding: 40px;
            width: 450px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid #eee;
        }

        .info-row:last-child {
            border-bottom: none;
        }

        .label {
            font-weight: bold;
            color: #555;
        }

        .value {
            color: #333;
        }

        .logout-btn {
            width: 100%;
            margin-top: 30px;
            padding: 12px;
            background: #e74c3c;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
        }

        .logout-btn:hover {
            background: #c0392b;
        }

        #loading {
            text-align: center;
            color: #888;
        }
    </style>
</head>
<body>

<div class="card">
    <h1>🎓 Student Dashboard</h1>

    <div id="loading">Loading your details...</div>

    <div id="studentInfo" style="display:none;">
        <div class="info-row">
            <span class="label">Full Name</span>
            <span class="value" id="fullName"></span>
        </div>
        <div class="info-row">
            <span class="label">Username</span>
            <span class="value" id="username"></span>
        </div>
        <div class="info-row">
            <span class="label">Roll Number</span>
            <span class="value" id="rollNumber"></span>
        </div>
        <div class="info-row">
            <span class="label">Department</span>
            <span class="value" id="department"></span>
        </div>
        <div class="info-row">
            <span class="label">Semester</span>
            <span class="value" id="semester"></span>
        </div>
        <div class="info-row">
            <span class="label">CGPA</span>
            <span class="value" id="cgpa"></span>
        </div>
        <div class="info-row">
            <span class="label">Attendance</span>
            <span class="value" id="attendance"></span>
        </div>
    </div>

    <button class="logout-btn" onclick="logout()">Logout</button>
</div>

<script>
    async function loadStudentData() {
        const token = localStorage.getItem("jwt");

        if (!token) {
            window.location.href = "/login.html";
            return;
        }

        // Decode role from JWT
        const payload = JSON.parse(atob(token.split('.')[1]));
        if (payload.role !== "STUDENT") {
            window.location.href = "/login.html";
            return;
        }

        try {
            const response = await fetch("/api/student/me", {
                headers: {
                    "Authorization": "Bearer " + token
                }
            });

            if (!response.ok) {
                alert("Session expired. Please login again.");
                window.location.href = "/login.html";
                return;
            }

            const student = await response.json();

            // Fill in the details
            document.getElementById("fullName").innerText   = student.fullName   || "-";
            document.getElementById("username").innerText   = student.username   || "-";
            document.getElementById("rollNumber").innerText = student.rollNumber || "-";
            document.getElementById("department").innerText = student.department || "-";
            document.getElementById("semester").innerText   = student.semester   || "-";
            document.getElementById("cgpa").innerText       = student.cgpa       || "-";
            document.getElementById("attendance").innerText = student.attendance + "%" || "-";

            document.getElementById("loading").style.display     = "none";
            document.getElementById("studentInfo").style.display = "block";

        } catch (error) {
            document.getElementById("loading").innerText = "Failed to load data.";
            console.error(error);
        }
    }

    function logout() {
        localStorage.clear();
        window.location.href = "/login.html";
    }

    window.onload = loadStudentData;
</script>

</body>
</html>
